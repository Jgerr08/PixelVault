<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PixelVault</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
}

header {
    background: white;
    border-bottom: 1px solid #eee;
    padding: 12px 40px;
}

.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.left {
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo-img {
    height: 100px;
    width: auto;
    object-fit: contain;
}

.brand {
    font-weight: 700;
    font-size: 20px;
}

.hero {
    padding: 60px 40px 20px;
}

.hero h1 {
    font-size: 40px;
    margin: 0;
}

.hero p {
    color: #666;
    margin-top: 10px;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px 40px;
}

select {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    border-radius: 18px;
    padding: 18px;
    transition: all 0.25s ease;
    box-shadow: 0 6px 25px rgba(0,0,0,0.06);
}

.card:hover {
    transform: translateY(-6px);
}

.titulo {
    font-size: 16px;
    font-weight: 600;
}

.info {
    color: gray;
    margin: 4px 0;
    font-size: 14px;
}

.precio {
    font-size: 18px;
    font-weight: bold;
    margin-top: 8px;
}

.stock {
    margin-top: 4px;
    font-size: 13px;
}

.stock-ok {
    color: #6a00ff;
}

.stock-no {
    color: #c300ff;
}

.mensaje {
    text-align: center;
    color: #777;
    margin-top: 20px;
}

@media (max-width: 600px) {
    header {
        padding: 10px 20px;
    }

    .hero {
        padding: 30px 20px;
    }

    .hero h1 {
        font-size: 26px;
    }

    .container {
        padding: 10px 20px;
    }

    .grid {
        grid-template-columns: 1fr;
    }

    .logo-img {
        height: 26px;
    }
}
</style>
</head>

<body>

<header>
    <div class="nav">
        <div class="left">
            <img src="top_game_store.png" class="logo-img">
            <span class="brand">PixelVault</span>
        </div>
    </div>
</header>

<section class="hero">
    <h1>Tu tienda de videojuegos de confianza</h1>
    <p>Catálogo oficial de la tienda PixelVault</p>
</section>

<div class="container">

<select id="filtro">
    <option value="">Todas las consolas</option>
    <option value="Xbox">Xbox</option>
    <option value="PlayStation">PlayStation</option>
    <option value="Nintendo">Nintendo</option>
    <option value="PC">PC</option>
</select>

<div class="grid" id="catalogo"></div>

</div>

<script>

let juegosGlobal = [
    { titulo: "Lego Batman: The Videogame", consola: "Xbox", precio: 200, stock: 3, img: "img/batman.jpg" },
    { titulo: "Lego Harry Potter: Years 1-4", consola: "Xbox", precio: 250, stock: 3, img: "img/lego-harry-potter.jpg" },
    { titulo: "Lego Star Wars: The Complete Saga", consola: "Xbox", precio: 400, stock: 1, img: "img/star_wars.jpg" },
    { titulo: "Kinect Rush: Una aventura de Disney Pixar", consola: "Xbox", precio: 200, stock: 3, img: "img/disney-rush.jpg" },
    { titulo: "Kinect Sports Ultimate Collection", consola: "Xbox", precio: 250, stock: 0, img: "img/kinect-sports-UC.jpg" },
    { titulo: "Kinect Sports 01", consola: "Xbox", precio: 100, stock: 3, img: "img/kinect-sports-01.jpeg" },
    { titulo: "Kinect Adventures", consola: "Xbox", precio: 150, stock: 4, img: "img/kinect-adventures.jpg" }
];

render(juegosGlobal);

function render(lista) {
    let filtro = document.getElementById("filtro").value;

    if (filtro) {
        lista = lista.filter(j => j.consola === filtro);
    }

    let contenedor = document.getElementById("catalogo");

    if (lista.length === 0) {
        contenedor.innerHTML =
            "<p class='mensaje'>No hay juegos disponibles</p>";
        return;
    }

    contenedor.innerHTML = "";

    lista.forEach(j => {
        let stockClass = j.stock > 0 ? "stock-ok" : "stock-no";

        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${j.img}" style="width:100%; height:160px; object-fit:cover; border-radius:12px; margin-bottom:10px;">

            <div class="titulo">${j.titulo}</div>
            <div class="info">${j.consola}</div>
            <div class="precio">$${j.precio}</div>
            <div class="stock ${stockClass}">
                ${j.stock > 0 ? "Disponibles: " + j.stock : "Agotado"}
            </div>
        `;

        contenedor.appendChild(card);
    });
}

document.getElementById("filtro").addEventListener("change", () => render(juegosGlobal));

cargarJuegos();

</script>

</body>
</html>
